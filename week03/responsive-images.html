<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="Responsive images practice using the picture element"
  >
  <meta name="author" content="Tomás Suárez">

  <title>Responsive Images</title>

  <link rel="stylesheet" href="styles/responsive-images.css">
</head>

<body>
  <header>
    <h1>Responsive Images</h1>
  </header>

  <main>
    <div class="hero">
      <picture>
        <source
          srcset="images/temple-large.jpg"
          media="(min-width: 1000px)"
        >

        <source
          srcset="images/temple-medium.jpg"
          media="(min-width: 500px)"
        >

        <img
          src="images/temple-small.jpg"
          alt="Nombre del templo y su ubicación"
          width="500"
          height="250"
        >
      </picture>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Tomás Suárez</p>
  </footer>
</body>
</html>
